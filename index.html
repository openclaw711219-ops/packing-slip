<title>BABY尋寶趣 - 出貨單產生器</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", sans-serif; background: #f0f2f5; color: #000; }

/* Upload UI */
.upload-area {
  max-width: 560px; margin: 40px auto; padding: 50px 40px;
  background: #fff; border: 3px dashed #999; border-radius: 12px;
  text-align: center; cursor: pointer; transition: border-color .2s;
}
.upload-area.dragover { border-color: #333; background: #eee; }
.upload-area h1 { font-size: 26px; margin-bottom: 6px; }
.upload-area p { font-size: 15px; color: #666; margin-top: 10px; }
.upload-area input[type="file"] { display: none; }

/* Date input area */
.date-input-area {
  max-width: 560px; margin: 0 auto 20px; padding: 20px 30px;
  background: #fff; border-radius: 8px; display: none; text-align: center;
}
.date-input-area label { font-size: 16px; font-weight: bold; }
.date-input-area input[type="text"] {
  font-size: 18px; padding: 6px 12px; border: 2px solid #333; border-radius: 6px;
  width: 200px; margin: 8px 10px; text-align: center;
}
.date-input-area button {
  padding: 8px 24px; font-size: 16px; border: 2px solid #333; border-radius: 6px;
  cursor: pointer; background: #333; color: #fff; font-weight: bold;
}
.date-input-area button:hover { background: #555; }

/* Toolbar */
.toolbar {
  max-width: 900px; margin: 16px auto; display: none; align-items: center; gap: 12px; flex-wrap: wrap;
}
.toolbar button {
  padding: 8px 24px; font-size: 15px; border: 2px solid #333; border-radius: 6px;
  cursor: pointer; background: #333; color: #fff; font-weight: bold;
}
.toolbar button:hover { background: #555; }
.toolbar .info { font-size: 14px; color: #555; }
.toolbar .btn-reset { background: #fff; color: #333; }

/* Preview */
#preview { max-width: 900px; margin: 0 auto 40px; }

/* === Slip styling === */
.slip {
  width: 148mm; height: 210mm; padding: 5mm 7mm 5mm;
  background: #fff; margin: 16px auto; border: 1px solid #ccc;
  font-size: 11pt; line-height: 1.35; position: relative;
  overflow: hidden; color: #000;
  display: flex; flex-direction: column;
}

/* Header: company + notice */
.slip-header {
  display: flex;
  align-items: flex-start;
  margin-bottom: 2mm;
}
.slip-header-left { flex: 1; }
.slip-header-right { width: 25mm; text-align: right; }

.slip-header-left .company { font-size: 14pt; font-weight: bold; text-align: left; }
.slip-header-left .notice { font-size: 7.5pt; line-height: 1.4; margin-top: 1mm; color: #000; }

/* Customer line */
.slip-customer {
  font-size: 16pt; font-weight: bold; padding: 1.5mm 0;
  border-top: 2.5px solid #000; border-bottom: 2.5px solid #000;
  margin-bottom: 1.5mm; display: flex; justify-content: space-between; align-items: baseline;
}
.slip-customer .seq { font-size: 16pt; }
.slip-customer .name { font-size: 16pt; flex: 1; margin: 0 3mm; }
.slip-customer .date-tag { font-size: 12pt; white-space: nowrap; }

/* Product rows */
.slip-products { flex: 1; }
.slip-row {
  display: flex; align-items: baseline;
  border-bottom: 1px solid #000; padding: 0.8mm 0; height: 6.5mm;
  overflow: hidden;
}

/* 欄位寬度調整：單價(price)與數量(qty)縮減 2% (22px -> 20px), 分給明細(detail) */
.slip-row .prod { width: 45%; font-size: 10pt; white-space: nowrap; overflow: hidden; text-overflow: clip; }
.slip-row .detail { flex: 1; font-size: 10pt; white-space: nowrap; overflow: hidden; text-overflow: clip; padding: 0 1.5mm; }
.slip-row .price { width: 20px; text-align: right; font-size: 10pt; flex-shrink: 0; white-space: nowrap; overflow: hidden; }
.slip-row .qty { width: 20px; text-align: right; font-size: 11pt; flex-shrink: 0; padding-left: 1mm; }

/* Pending section */
.pending-label {
  font-size: 9pt; font-weight: bold; margin-top: 1.5mm; padding: 0.5mm 0;
  border-bottom: 1px dashed #000;
}

/* Total row */
.slip-total {
  display: flex; border-top: 2.5px solid #000; padding: 1mm 0 0;
  font-size: 11pt; font-weight: bold; margin-top: auto;
}
.slip-total .label { flex: 1; }
.slip-total .val { width: 20px; text-align: right; }

/* Print */
@media print {
  body { background: #fff; }
  .upload-area, .toolbar, .date-input-area { display: none !important; }
  #preview { max-width: none; margin: 0; }
  .slip { border: none; margin: 0; box-shadow: none; min-height: 0; }
  .slip-wrapper { page-break-after: always; }
  .slip-wrapper:last-child { page-break-after: avoid; }
  @page { size: A5; margin: 0; }
}
</style>
</head>
<body>

<div class="upload-area" id="dropZone">
  <h1>～ BABY尋寶趣 ～</h1>
  <p style="font-size:18px; font-weight:bold;">出貨單產生器</p>
  <p>點擊或拖曳 Excel (.xlsx) 檔案至此處</p>
  <input type="file" id="fileInput" accept=".xlsx,.xls">
</div>

<div class="date-input-area" id="dateArea">
  <label>結單日期：BABY尋寶趣-</label>
  <input type="text" id="dateInput" placeholder="26/1/10">
  <label>結單</label>
  <br><br>
  <button onclick="generateSlips()">產生出貨單</button>
</div>

<div class="toolbar" id="toolbar">
  <button onclick="window.print()">🖨️ 列印全部</button>
  <button class="btn-reset" onclick="location.reload()">重新上傳</button>
  <span class="info" id="stats"></span>
</div>

<div id="preview"></div>

<script>
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
let parsedRows = null;

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const wb = XLSX.read(e.target.result, { type: 'array' });
    const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1, defval: '' });
    parsedRows = rows.slice(1).filter(r => r[1]);
    // Show date input
    dropZone.style.display = 'none';
    document.getElementById('dateArea').style.display = 'block';
    document.getElementById('dateInput').focus();
  };
  reader.readAsArrayBuffer(file);
}

function generateSlips() {
  const dateStr = document.getElementById('dateInput').value.trim();
  if (!dateStr) { alert('請輸入結單日期'); return; }
  processData(parsedRows, dateStr);
}

function processData(rows, dateStr) {
  // Group by customer name (col B = index 1)
  const groups = new Map();
  for (const r of rows) {
    const name = String(r[1]).trim();
    if (!name) continue;
    if (!groups.has(name)) groups.set(name, []);
    groups.get(name).push({
      product: String(r[0] || ''),
      price: Number(r[2]) || 0,
      qty: Number(r[3]) || 0,
      detail: String(r[5] || '').trim(),
      note: String(r[6] || '').trim(),
      seq: r[11] || ''  // L column = index 11
    });
  }

  const companyLine = 'BABY尋寶趣-' + esc(dateStr) + '結單';

  let html = '';
  for (const [name, items] of groups) {
    const seq = items[0].seq;
    const slipId = 'slip-' + Math.random().toString(36).substr(2, 9);

    // Sort: 退款 first, then normal, then 待補寄 separated
    const refund = items.filter(i => i.note === '退款');
    const normal = items.filter(i => i.note !== '退款' && i.note !== '待補寄');
    const pending = items.filter(i => i.note === '待補寄');
    const shipItems = [...refund, ...normal]; // 退款 first, then normal
    const shipQty = shipItems.reduce((s, i) => s + i.qty, 0);

    html += `<div class="slip-wrapper"><div class="slip">`;

    // Header: company + notice + QR Code
    html += `<div class="slip-header">
      <div class="slip-header-left">
        <div class="company">～ ${companyLine} ～</div>
        <div class="notice">媽咪您好，附上此次購買明細，若有待補寄/退款字樣部分，再請媽咪特別留意喔，感謝您<br>• 待補寄：待商品到貨後會盡快補寄給媽咪喔<br>• 退款：因廠商尚未有正確到貨時間，避免媽咪久候先退款給媽咪</div>
      </div>
      <div class="slip-header-right">
        <div class="qrcode"></div>
      </div>
    </div>`;

    // Customer line
    html += `<div class="slip-customer">
      <span class="seq">${esc(String(seq))}</span>
      <span class="name">${esc(name)}</span>
      <span class="date-tag">&lt;${esc(dateStr)}結單&gt;</span>
    </div>`;

    // Product rows (ship items)
    html += `<div class="slip-products">`;
    for (const item of shipItems) {
      const prefix = item.note === '退款' ? '退款-' : '';
      html += `<div class="slip-row">
        <div class="prod">${esc(prefix)}${esc(item.product)}</div>
        <div class="detail">${esc(item.detail)}</div>
        <div class="price">${item.price}</div>
        <div class="qty">${item.qty}</div>
      </div>`;
    }

    // Pending section
    if (pending.length) {
      html += `<div class="pending-label">▼ 待補寄（本次不出貨）</div>`;
      for (const item of pending) {
        html += `<div class="slip-row">
          <div class="prod">待補寄-${esc(item.product)}</div>
          <div class="detail">${esc(item.detail)}</div>
          <div class="price">${item.price}</div>
          <div class="qty">${item.qty}</div>
        </div>`;
      }
    }

    // Total
    html += `</div>`;
    html += `<div class="slip-total">
      <div class="label">總計</div>
      <div class="val">${shipQty}</div>
    </div>`;

    html += `</div></div>`;
  }

  document.getElementById('preview').innerHTML = html;
  document.getElementById('toolbar').style.display = 'flex';
  document.getElementById('dateArea').style.display = 'none';
  document.getElementById('stats').textContent = `共 ${groups.size} 位客戶，${rows.length} 筆商品`;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>
</body>
</html>
