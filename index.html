<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BABY尋寶趣 - 出貨單產生器</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", sans-serif; background: #f0f2f5; color: #333; }

/* Upload UI */
.upload-area {
  max-width: 600px; margin: 40px auto; padding: 60px 40px;
  background: #fff; border: 3px dashed #ccc; border-radius: 16px;
  text-align: center; cursor: pointer; transition: border-color .2s;
}
.upload-area.dragover { border-color: #e91e63; background: #fce4ec; }
.upload-area h1 { font-size: 28px; margin-bottom: 8px; color: #e91e63; }
.upload-area p { font-size: 16px; color: #888; margin-top: 12px; }
.upload-area input { display: none; }

/* Toolbar */
.toolbar {
  max-width: 1000px; margin: 20px auto; display: none; align-items: center; gap: 12px; flex-wrap: wrap;
}
.toolbar button {
  padding: 10px 28px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer;
  background: #e91e63; color: #fff; font-weight: bold;
}
.toolbar button:hover { background: #c2185b; }
.toolbar .info { font-size: 14px; color: #666; }
.toolbar .btn-reset { background: #757575; }

/* Preview */
#preview { max-width: 1000px; margin: 0 auto 40px; }

/* Slip styling (shared screen + print) */
.slip {
  width: 148mm; min-height: 180mm; padding: 8mm 10mm 10mm;
  background: #fff; margin: 16px auto; border: 1px solid #ddd;
  font-size: 13pt; line-height: 1.4; position: relative;
}
.slip-header { text-align: center; margin-bottom: 6mm; border-bottom: 2px solid #333; padding-bottom: 4mm; }
.slip-header .company { font-size: 22pt; font-weight: bold; letter-spacing: 2px; }
.slip-header .customer { font-size: 15pt; margin-top: 3mm; }
.slip-header .customer .code { color: #888; font-size: 12pt; margin-left: 8px; }

.slip table { width: 100%; border-collapse: collapse; font-size: 12pt; }
.slip th { background: #f5f5f5; font-size: 11pt; padding: 3px 4px; border: 1px solid #aaa; text-align: center; }
.slip td { padding: 2px 4px; border: 1px solid #ccc; }
.slip td.num { text-align: right; white-space: nowrap; }
.slip td.ctr { text-align: center; }
.slip .product-name { font-size: 13pt; }

.slip .section-label { font-size: 11pt; font-weight: bold; margin: 4mm 0 1mm; padding: 1px 4px; background: #fff3e0; display: inline-block; border-radius: 3px; }
.slip .section-label.pending { background: #e3f2fd; }

.refund-tag { font-size: 9pt; color: #fff; background: #e91e63; padding: 1px 5px; border-radius: 3px; margin-left: 4px; vertical-align: middle; }
.strike { text-decoration: line-through; color: #999; }

.slip-footer { margin-top: 4mm; border-top: 2px solid #333; padding-top: 3mm; font-size: 12pt; }
.slip-footer .totals { display: flex; justify-content: space-between; font-weight: bold; font-size: 14pt; margin-bottom: 2mm; }
.slip-footer .notice { font-size: 9pt; color: #666; line-height: 1.3; }

/* Print */
@media print {
  body { background: #fff; }
  .upload-area, .toolbar { display: none !important; }
  #preview { max-width: none; margin: 0; }
  .slip { border: none; margin: 0; padding: 6mm 8mm 8mm; width: 148mm; min-height: auto; box-shadow: none; }
  .slip-wrapper { page-break-after: always; }
  .slip-wrapper:last-child { page-break-after: avoid; }
  @page { size: A5; margin: 0; }
}
</style>
</head>
<body>

<div class="upload-area" id="dropZone">
  <h1>🎀 BABY尋寶趣</h1>
  <p style="font-size:20px; font-weight:bold;">出貨單產生器</p>
  <p>點擊或拖曳 Excel (.xlsx) 檔案至此處</p>
  <input type="file" id="fileInput" accept=".xlsx,.xls">
</div>

<div class="toolbar" id="toolbar">
  <button onclick="window.print()">🖨️ 列印全部</button>
  <button class="btn-reset" onclick="location.reload()">重新上傳</button>
  <span class="info" id="stats"></span>
</div>

<div id="preview"></div>

<script>
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const wb = XLSX.read(e.target.result, { type: 'array' });
    const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1, defval: '' });
    processData(rows.slice(1).filter(r => r[1])); // skip header, need customer name
  };
  reader.readAsArrayBuffer(file);
}

function processData(rows) {
  // Group by customer name (col B = index 1)
  const groups = new Map();
  for (const r of rows) {
    const name = String(r[1]).trim();
    if (!name) continue;
    if (!groups.has(name)) groups.set(name, []);
    groups.get(name).push({
      product: r[0] || '', customer: name, price: Number(r[2]) || 0,
      qty: Number(r[3]) || 0, amount: Number(r[4]) || 0,
      detail: r[5] || '', note: String(r[6] || '').trim(),
      code: r[10] || ''
    });
  }

  let html = '';
  for (const [name, items] of groups) {
    const code = items[0].code;
    const normal = items.filter(i => i.note !== '退款' && i.note !== '待補寄');
    const refund = items.filter(i => i.note === '退款');
    const pending = items.filter(i => i.note === '待補寄');
    const shipQty = normal.reduce((s,i) => s+i.qty, 0) + refund.reduce((s,i) => s+i.qty, 0);
    const totalQty = items.reduce((s,i) => s+i.qty, 0);

    html += `<div class="slip-wrapper"><div class="slip">
      <div class="slip-header">
        <div class="company">BABY尋寶趣</div>
        <div class="customer">${esc(name)}${code ? `<span class="code">#${esc(String(code))}</span>` : ''}</div>
      </div>`;

    // Build table
    html += `<table><tr><th style="width:40%">產品名稱</th><th style="width:22%">明細</th><th style="width:12%">單價</th><th style="width:10%">數量</th><th style="width:16%">金額</th></tr>`;

    for (const item of normal) html += itemRow(item, false);

    if (refund.length) {
      html += `<tr><td colspan="5" style="border:none;padding:2px 0"><span class="section-label">退款商品（隨貨出）</span></td></tr>`;
      for (const item of refund) html += itemRow(item, true);
    }

    html += `</table>`;

    if (pending.length) {
      html += `<div class="section-label pending" style="margin-top:3mm">待補寄（本次不出貨）</div>`;
      html += `<table><tr><th style="width:40%">產品名稱</th><th style="width:22%">明細</th><th style="width:12%">單價</th><th style="width:10%">數量</th><th style="width:16%">金額</th></tr>`;
      for (const item of pending) html += itemRow(item, false);
      html += `</table>`;
    }

    html += `<div class="slip-footer">
      <div class="totals"><span>本次出貨數量：${shipQty}</span><span>總件數：${totalQty}</span></div>
      ${(refund.length || pending.length) ? `<div class="notice">⚠️ 標示「待補寄」之商品將於到貨後另行寄出；「退款」商品金額將退回。</div>` : ''}
    </div></div></div>`;
  }

  document.getElementById('preview').innerHTML = html;
  document.getElementById('toolbar').style.display = 'flex';
  document.getElementById('stats').textContent = `共 ${groups.size} 位客戶，${rows.length} 筆商品`;
  dropZone.style.display = 'none';
}

function itemRow(item, isRefund) {
  return `<tr>
    <td class="product-name">${esc(item.product)}${isRefund ? '<span class="refund-tag">退款</span>' : ''}</td>
    <td>${esc(item.detail)}</td>
    <td class="num">${item.price}</td>
    <td class="ctr">${item.qty}</td>
    <td class="num ${isRefund ? 'strike' : ''}">${item.amount}</td>
  </tr>`;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>
</body>
</html>
